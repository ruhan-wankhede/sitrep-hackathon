<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Interview Scorecard{% endblock %}</title>
  <meta name="description" content="Evidence-backed interview scorecards and panel intelligence for hiring teams.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='28' height='28' rx='8' fill='%23ADAE52'/%3E%3Crect x='10' y='10' width='12' height='12' rx='3' fill='%23211D18'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Anton', 'sans-serif'],
            sans: ['Archivo', 'system-ui', 'sans-serif'],
            mono: ['ui-monospace', '"SFMono-Regular"', 'Menlo', 'monospace'],
          },
          colors: {
            paper: '#FBF9F6', cream: '#FCFBF9',
            surface: { DEFAULT: '#F5F1EA', 2: '#EFE9E0' },
            line: { DEFAULT: '#E7E1D8', 2: '#D8D0C4' },
            ink: { DEFAULT: '#211D18', dark: '#3B362E', muted: '#6E6659', faint: '#A39A8C' },
            olive: { DEFAULT: '#ADAE52', deep: '#6F7020', hover: '#9C9D45', wash: '#EDEDD6', deeper: '#565717' },
            ember: { DEFAULT: '#E8912A', deep: '#8A5A12', wash: '#FBEBD3' },
            clay: { DEFAULT: '#C67E64', deep: '#7C4230', wash: '#F5E4DC' },
          },
          boxShadow: {
            card: '0 8px 24px rgba(33,29,24,.05)',
            lift: '0 10px 30px rgba(33,29,24,.1)',
            panel: '0 6px 18px rgba(33,29,24,.18)',
          },
        },
      },
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .tnum { font-variant-numeric: tabular-nums; }
    ::selection { background: #EDEDD6; }
    html { scroll-behavior: smooth; }
    a:focus-visible, button:focus-visible, [tabindex]:focus-visible {
      outline: none; box-shadow: 0 0 0 3px #EDEDD6, 0 0 0 4px #6F7020; border-radius: 6px;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="bg-paper text-ink min-h-screen font-sans antialiased">
  <header class="sticky top-0 z-40 border-b border-line bg-paper/90 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 py-3.5 flex items-center gap-3">
      <a href="/d/{{ token }}" class="group flex items-center gap-2.5">
        <span class="grid h-8 w-8 place-items-center rounded-[11px] bg-olive text-ink text-sm transition group-hover:bg-olive-hover">▣</span>
        <span class="font-bold tracking-[-0.01em] text-[17px]">Interview Scorecard</span>
      </a>
      <span class="mt-0.5 font-mono text-[11px] uppercase tracking-[0.16em] text-olive-deep">panel intelligence</span>
    </div>
  </header>
  <main class="relative max-w-6xl mx-auto px-6 pt-12 pb-24">{% block content %}{% endblock %}</main>
</body>
</html>
